<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Конструктор пам'ятників</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        /* Стиль для кнопок, щоб вони були поверх моделі */
        .controls { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 100; 
            background: rgba(255, 255, 255, 0.8);
            padding: 15px;
            border-radius: 8px;
        }
        button { 
            padding: 10px 15px; 
            margin: 5px; 
            cursor: pointer; 
            background-color: #333; 
            color: white; 
            border: none; 
            border-radius: 4px;
        }
        /* Встановлюємо сірий фон для моделі, щоб вона не зливалася */
        model-viewer {
            width: 100%;
            height: 90vh;
            background-color: #e0e0e0;
        }
    </style>
</head>
<body>

    <div class="controls">
        <h3>Керування:</h3>
        <button onclick="togglePart('arka_1')">Вкл/Викл Арка 1</button>
        <button onclick="togglePart('arka_2')">Вкл/Викл Арка 2</button>
    </div>

    <model-viewer id="model" src="test_2.glb" camera-controls shadow-intensity="1"></model-viewer>

   <script>
    const modelViewer = document.getElementById('model');

       modelViewer.addEventListener('load', () => {
    // Цей код виведе список усіх об'єктів моделі в консоль F12
    const allParts = modelViewer.querySelectorAll('[name]');
    allParts.forEach(part => console.log("Знайдено об'єкт з іменем:", part.name));
});

    function togglePart(partName) {
        // У model-viewer об'єкти доступні через метод querySelector на самій моделі
        const part = modelViewer.querySelector(`[name="${partName}"]`);
        
        if (part) {
            // Змінюємо видимість
            part.visible = !part.visible;
        } else {
            console.error("Об'єкт з ім'ям " + partName + " не знайдено!");
        }
    }
</script>
</body>
</html>
