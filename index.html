<script>
    // Поточний стан (За замовчуванням увімкнена перша основа, а арка схована)
    let currentOsnovaName = 'osnova';
    let currentArkaName = '';

    const viewer = document.getElementById('main-model');

    // ГОЛОВНА ЛОГІКА ПОДВІЙНОГО МАГНІЧЕННЯ
    function updateConstructor() {
        const symbol = Object.getOwnPropertySymbols(viewer).find(e => e.description === 'scene');
        const scene = viewer[symbol];
        if (!scene) return;

        let socketCenter = null;
        let activeOsnova = null;
        let activeSocketOsnova = null;
        let activeArka = null;

        // Очищаємо індекси для правильного порівняння (перетворюємо osnova_1 або osnova_01 на просто цифру/суфікс)
        const getSuffix = (name) => name.includes('_') ? name.split('_').pop() : '';

        scene.traverse((node) => {
            if (node.isMesh) {
                
                // 1. Центральний сокет
                if (node.name === 'socket_center') {
                    socketCenter = node;
                    node.visible = false; 
                }

                // 2. Фільтр основ (перевіряємо точний збіг імені або за ієрархією Blender)
                if (node.name.startsWith('osnova')) {
                    // Перевіряємо чи це меш самої основи, а не сокет
                    if (!node.name.startsWith('socket_osnova')) {
                        if (node.name === currentOsnovaName) {
                            node.visible = true;
                            activeOsnova = node;
                        } else {
                            node.visible = false;
                        }
                    }
                }
                
                // 3. Фільтр сокетів, які прив'язані до основ
                if (node.name.startsWith('socket_osnova')) {
                    node.visible = false; // Кубики завжди невидимі
                    
                    const osnovaSuffix = getSuffix(currentOsnovaName);
                    const socketSuffix = getSuffix(node.name);
                    
                    if (osnovaSuffix === socketSuffix) {
                        activeSocketOsnova = node;
                    }
                }

                // 4. Фільтр арок
                if (node.name.startsWith('arka')) {
                    if (node.name === currentArkaName && currentArkaName !== '') {
                        node.visible = true;
                        activeArka = node;
                    } else {
                        node.visible = false;
                    }
                }
            }
        });

        // ЕТАП А: Основа летить до socket_center
        if (socketCenter && activeOsnova) {
            activeOsnova.position.x = socketCenter.position.x;
            activeOsnova.position.y = socketCenter.position.y;
            activeOsnova.position.z = socketCenter.position.z;
        }

        // ЕТАП Б: ...і арка летить до сокета поточної основи
        if (activeSocketOsnova && activeArka) {
            activeArka.position.x = activeSocketOsnova.position.x;
            activeArka.position.y = activeSocketOsnova.position.y;
            activeArka.position.z = activeSocketOsnova.position.z;
        }

        // КРИТИЧНО ВАЖЛИВО: Примусово змушуємо плеєр перемалювати 3D-сцену прямо зараз!
        viewer.requestUpdate();
    }

    // КЛІК НА ОСНОВУ
    function changeOsnova(name) {
        currentOsnovaName = name;
        currentArkaName = ''; // При зміні основи ховаємо арку (все інше зникає)
        
        // Оновлюємо підсвітку кнопок основ
        document.querySelectorAll('[id^="btn-osnova"]').forEach(b => b.classList.remove('active'));
        const activeBtn = document.getElementById('btn-' + name);
        if (activeBtn) activeBtn.classList.add('active');
        
        // Гасимо підсвітку кнопок арок
        document.querySelectorAll('[id^="btn-arka"]').forEach(b => b.classList.remove('active'));

        updateConstructor();
    }

    // КЛІК НА АРКУ
    function changeArka(name) {
        currentArkaName = name;
        
        // Оновлюємо підсвітку кнопок арок
        document.querySelectorAll('[id^="btn-arka"]').forEach(b => b.classList.remove('active'));
        const activeBtn = document.getElementById('btn-' + name);
        if (activeBtn) activeBtn.classList.add('active');

        updateConstructor();
    }

    // Запуск системи при завантаженні 3D-файлу
    viewer.addEventListener('load', () => {
        updateConstructor();
        // Робимо ще один запуск через мікро-паузу, щоб Three.js встиг все прорахувати
        setTimeout(updateConstructor, 100);
    });
</script>
