<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>3D Конструктор Пам'ятників - 3D Art Co</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    
    <style>
        body { background-color: #141414; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        h1 { margin-bottom: 5px; font-size: 24px; }
        .container { display: flex; flex-direction: column; align-items: center; gap: 20px; max-width: 1200px; margin: 0 auto; }
        model-viewer { width: 100%; height: 60vh; background: radial-gradient(#2c3e50, #1a252f); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .control-panel { background: #222; padding: 20px; border-radius: 12px; width: 100%; box-sizing: border-box; }
        .section-title { font-size: 16px; text-transform: uppercase; color: #888; margin: 15px 0 10px 0; letter-spacing: 1px; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
        button { background: #333; color: white; border: 2px solid #444; padding: 12px 24px; font-size: 14px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: all 0.2s; }
        button:hover { background: #444; border-color: #f39c12; }
        button.active { background: #f39c12; border-color: #d35400; color: black; }
    </style>
</head>
<body>

<div class="container">
    <div>
        <h1>Конструктор 3D Art Co</h1>
        <p style="color: #888; margin: 0;">Автоматичне модульне стикування через пустишки</p>
    </div>

    <model-viewer id="main-model" src="https://raw.githubusercontent.com/Andriivskyi/monument-constructor/refs/heads/main/constructor.glb" camera-controls shadow-intensity="1" environment-image="neutral"></model-viewer>

    <div class="control-panel">
        
        <div class="section-title">1. Виберіть Основу (Плиту):</div>
        <div class="btn-group">
            <button id="btn-osnova" class="active" onclick="changeOsnova('osnova')">Основа 1</button>
            <button id="btn-osnova_1" onclick="changeOsnova('osnova_1')">Основа 2</button>
            <button id="btn-osnova_2" onclick="changeOsnova('osnova_2')">Основа 3</button>
        </div>

        <div class="section-title">2. Виберіть Арку (Стелу):</div>
        <div class="btn-group">
            <button id="btn-arka" onclick="changeArka('arka')">Арка: Пряма</button>
            <button id="btn-arka_1" onclick="changeArka('arka_1')">Арка: Хвилька</button>
            <button id="btn-arka_2" onclick="changeArka('arka_2')">Арка: Купол</button>
        </div>

    </div>
</div>

<script>
    // Початковий стан: Основа 1 активна, арка поки не вибрана (пусто)
    let currentOsnovaName = 'osnova';
    let currentArkaName = '';

    const viewer = document.getElementById('main-model');

    // ГОЛОВНА ФУНКЦІЯ ОНОВЛЕННЯ СЦЕНИ
    function updateConstructor() {
        if (!viewer) return;
        
        // Отримуємо прямий доступ до сцени Three.js всередині вівера
        const symbol = Object.getOwnPropertySymbols(viewer).find(e => e.description === 'scene');
        const scene = viewer[symbol];
        if (!scene) return;

        let activeSocketOsnova = null;
        let arkaContainer = null;

        // Допоміжний метод для точного пошуку індексів сокетів (наприклад, з 'socket_osnova_1' дістане '1')
        const getSuffix = (name, prefix) => {
            return name.replace(prefix, '').replace('_', '');
        };

        // ЕТАП 1: Проходимо по ВСІХ об'єктах 3D сцени
        scene.traverse((node) => {
            
            // Ловимо нашу головну пустишку-коробку за іменем
            if (node.name === 'arka_parent') {
                arkaContainer = node;
            }

            // Перевіряємо 3D меші
            if (node.isMesh) {
                
                // Ховаємо технічні сокети, щоб користувач їх не бачив
                if (node.name.startsWith('socket_')) {
                    node.visible = false;
                    
                    // Шукаємо сокет, який належить саме СЕЙЧАС вибраній основі
                    const osnovaIndex = getSuffix(currentOsnovaName, 'osnova');
                    const socketIndex = getSuffix(node.name, 'socket_osnova');
                    
                    if (osnovaIndex === socketIndex) {
                        activeSocketOsnova = node; // Запам'ятовуємо цей сокет як точку прив'язки
                    }
                    return;
                }

                // Вмикаємо тільки ту основу, яку натиснув користувач
                if (node.name.startsWith('osnova')) {
                    node.visible = (node.name === currentOsnovaName);
                }

                // Вмикаємо потрібну арку всередині пустишки (якщо вона взагалі вибрана)
                if (node.name.startsWith('arka')) {
                    node.visible = (node.name === currentArkaName && currentArkaName !== '');
                }
            }
        });

        // ЕТАП 2: Магнітимо ВЕСЬ КОНТЕЙНЕР (пустишку) разом з арками на висоту активного сокета
        if (activeSocketOsnova && arkaContainer) {
            // Копіюємо координати сокета в пустишку
            arkaContainer.position.copy(activeSocketOsnova.position);
            
            // Жорстко переписуємо матриці трансформації, щоб обертання миші не могло їх скинути
            arkaContainer.updateMatrix();
            arkaContainer.updateMatrixWorld(true);
        }

        // Примусово перемальовуємо вівер з новими налаштуваннями
        viewer.requestUpdate();
    }

    // КЛІК НА КНОПКУ ОСНОВИ
    function changeOsnova(name) {
        currentOsnovaName = name;
        
        document.querySelectorAll('[id^="btn-osnova"]').forEach(b => b.classList.remove('active'));
        const activeBtn = document.getElementById('btn-' + name);
        if (activeBtn) activeBtn.classList.add('active');

        updateConstructor();
    }

    // КЛІК НА КНОПКУ АРКИ
    function changeArka(name) {
        currentArkaName = name;
        
        document.querySelectorAll('[id^="btn-arka"]').forEach(b => b.classList.remove('active'));
        const activeBtn = document.getElementById('btn-' + name);
        if (activeBtn) activeBtn.classList.add('active');

        updateConstructor();
    }

    // Запускаємо логіку синхронізації при завантаженні та на кожному кадрі руху миші
    if (viewer) {
        viewer.addEventListener('load', updateConstructor);
        viewer.addEventListener('render', updateConstructor);
    }
</script>

</body>
</html>
