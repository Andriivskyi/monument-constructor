<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Конструктор пам'ятників</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        .controls { 
            position: absolute; top: 20px; left: 20px; z-index: 100; 
            background: rgba(255, 255, 255, 0.8); padding: 15px; border-radius: 8px;
        }
        button { 
            padding: 10px 15px; margin: 5px; cursor: pointer; 
            background-color: #333; color: white; border: none; border-radius: 4px;
        }
        model-viewer {
            width: 100%; height: 90vh; background-color: #e0e0e0;
        }
    </style>
</head>
<body>

    <div class="controls">
        <h3>Керування:</h3>
        <button onclick="togglePart('arka_1')">Арка 1</button>
        <button onclick="togglePart('arka_2')">Арка 2</button>
        <p><small>Дивись консоль (F12) для назв!</small></p>
    </div>

    <model-viewer id="model" src="test_2.glb" camera-controls shadow-intensity="1"></model-viewer>

    <script>
        const modelViewer = document.getElementById('model');

        modelViewer.addEventListener('load', () => {
            // Цей блок виведе всі матеріали в консоль
            const model = modelViewer.model;
            console.log("Всі знайдені матеріали:", model.materialNames);
            
            // Якщо імена об'єктів порожні, ми побачимо список матеріалів
            model.materialNames.forEach(name => {
                console.log("Матеріал знайдено:", name);
            });
        });

      function togglePart(partName) {
    // Шукаємо об'єкт через model-viewer API
    const model = modelViewer.model;
    
    // Спробуємо знайти об'єкт, який містить partName в імені (на випадок прихованих префіксів)
    const part = modelViewer.model.getObjectByName(partName); 
    
    if (part) {
        part.visible = !part.visible;
    } else {
        console.error("Не вдалося знайти '" + partName + "'. Ось імена всіх вузлів, які я бачу:");
        // Виводимо в консоль все підряд, що є в моделі
        modelViewer.model.scenes.forEach(scene => {
            scene.traverse(node => {
                if (node.name) console.log("Знайдений вузол:", node.name);
            });
        });
    }
}
    </script>
</body>
</html>
