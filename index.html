<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        model-viewer { width: 100%; height: 600px; }
        .controls { padding: 15px; display: flex; gap: 10px; }
    </style>
</head>
<body>

<div class="controls">
    <button onclick="changeArka('arka_1.glb')">Арка 1</button>
    <button onclick="changeArka('arka_2.glb')">Арка 2</button>
</div>

<model-viewer id="main-model" src="osnova_1.glb" camera-controls></model-viewer>

<script>
    const viewer = document.getElementById('main-model');

    function changeArka(fileName) {
        // Ми не міняємо весь файл, ми міняємо лише джерело арки
        // Для простоти зараз підміняємо основний src
        viewer.src = fileName; 
        console.log("Завантажено:", fileName);
    }
</script>

</body>
</html>
