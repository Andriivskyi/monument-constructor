<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Конструктор пам'ятників</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a; /* Темний професійний фон */
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .controls {
            padding: 20px;
            display: flex;
            gap: 15px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            background: #444;
            border: none;
            color: white;
            border-radius: 5px;
        }

        button:hover { background: #666; }

        model-viewer {
            width: 90%;
            height: 70vh;
            background-color: #2c3e50; /* Фон самого вікна перегляду */
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h1>Конструктор монументів</h1>

    <div class="controls">
        <button onclick="changeModel('arka_1.glb')">Арка 1</button>
        <button onclick="changeModel('arka_2.glb')">Арка 2</button>
        <button onclick="changeModel('osnova_1.glb')">Скинути до основи</button>
    </div>

    <model-viewer id="main-model" 
                  src="osnova_1.glb" 
                  camera-controls 
                  auto-rotate 
                  shadow-intensity="1">
    </model-viewer>

    <script>
        function changeModel(fileName) {
            const viewer = document.getElementById('main-model');
            viewer.src = fileName;
            console.log("Завантажено модель:", fileName);
        }
    </script>
</body>
</html>
