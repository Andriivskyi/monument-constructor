<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>3D Конструктор Пам'ятників</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    
    <style>
        body { background-color: #141414; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; }
        h1 { margin-bottom: 5px; font-size: 24px; }
        .container { display: flex; flex-direction: column; align-items: center; gap: 20px; max-width: 1200px; margin: 0 auto; }
        
        /* Стилі для 3D вікна */
        model-viewer { width: 100%; height: 60vh; background: radial-gradient(#2c3e50, #1a252f); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Панель керування (кнопки) */
        .control-panel { background: #222; padding: 20px; border-radius: 12px; width: 100%; box-sizing: border-box; }
        .section-title { font-size: 16px; text-transform: uppercase; color: #888; margin: 15px 0 10px 0; letter-spacing: 1px; text-align: left; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
        
        /* Стилі кнопок */
        button { background: #333; color: white; border: 2px solid #444; padding: 12px 24px; font-size: 14px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: all 0.2s; }
        button:hover { background: #444; border-color: #f39c12; }
        button.active { background: #f39c12; border-color: #d35400; color: black; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div>
        <h1>Конструктор 3D Art Co</h1>
        <p style="color: #888; margin: 0;">Виберіть комплектацію для автоматичного стикування</p>
    </div>

    <model-viewer id="main-model" src="https://raw.githubusercontent.com/Andriivskyi/monument-constructor/refs/heads/main/constructor.glb" camera-controls shadow-intensity="1" environment-image="neutral"></model-viewer>

    <div class="control-panel">
        
        <div class="section-title">1. Виберіть Основу (Плиту):</div>
        <div class="btn-group">
            <button id="btn-osnova" class="active" onclick="changeOsnova('osnova')">Основа 1</button>
            <button id="btn-osnova_1" onclick="changeOsnova('osnova_1')">Основа 2</button>
            <button id="btn-osnova_2" onclick="changeOsnova('osnova_2')">Основа 3</button>
        </div>

        <div class="section-title">2. Виберіть Арку (Стелу):</div>
        <div class="btn-group">
            <button id="btn-arka" onclick="changeArka('arka')">Арка: Пряма</button>
            <button id="btn-arka_1" onclick="changeArka('arka_1')">Арка: Хвилька</button>
            <button id="btn-arka_2" onclick="changeArka('arka_2')">Арка: купол</button>
        </div>

    </div>
</div>

<script>
    // Поточний стан конструктора
    let currentOsnovaName = 'osnova';
    let currentArkaName = '';

    const viewer = document.getElementById('main-model');

    // ГОЛОВНА ФУНКЦІЯ ОНОВЛЕННЯ СЦЕНИ
    function updateConstructor() {
        if (!viewer) return;
        
        const symbol = Object.getOwnPropertySymbols(viewer).find(e => e.description === 'scene');
        const scene = viewer[symbol];
        if (!scene) return;

        let socketCenter = null;
        let activeOsnova = null;
        let activeSocketOsnova = null;
        let activeArka = null;

        const getSuffix = (name, prefix) => {
            return name.replace(prefix, '').replace('_', '');
        };

        // 1. Проходимо по сцені та виставляємо видимість/фільтри
        scene.traverse((node) => {
            if (node.isMesh) {
                
                // Центр сцени
                if (node.name === 'socket_center') {
                    socketCenter = node;
                    node.visible = false; 
                }

                // Видимість основ
                if (node.name.startsWith('osnova')) {
                    if (!node.name.startsWith('socket_osnova')) {
                        if (node.name === currentOsnovaName) {
                            node.visible = true;
                            activeOsnova = node;
                        } else {
                            node.visible = false;
                        }
                    }
                }
                
                // Сокети основ
                if (node.name.startsWith('socket_osnova')) {
                    node.visible = false;
                    
                    const osnovaIndex = getSuffix(currentOsnovaName, 'osnova');
                    const socketIndex = getSuffix(node.name, 'socket_osnova');
                    
                    if (osnovaIndex === socketIndex) {
                        activeSocketOsnova = node;
                    }
                }

                // Видимість арок
                if (node.name.startsWith('arka')) {
                    if (node.name === currentArkaName && currentArkaName !== '') {
                        node.visible = true;
                        activeArka = node;
                    } else {
                        node.visible = false;
                    }
                }
            }
        });

        // 2. Магнітимо позиції об'єктів
        if (socketCenter && activeOsnova) {
            activeOsnova.position.copy(socketCenter.position);
        }

        if (activeSocketOsnova && activeArka) {
            activeArka.position.copy(activeSocketOsnova.position);
        }

        // 3. РІШЕННЯ ПРОБЛЕМИ: Синхронізуємося з рідним циклом анімації model-viewer
        // Це змушує плеєр зафіксувати зміни в наступному ж кадрі, ігноруючи рух мишки
        requestAnimationFrame(() => {
            if (typeof viewer.queueRender === 'function') {
                viewer.queueRender();
            }
        });
    }

    // КЛІК НА КНОПКУ ОСНОВИ
    function changeOsnova(name) {
        currentOsnovaName = name;
        
        document.querySelectorAll('[id^="btn-osnova"]').forEach(b => b.classList.remove('active'));
        const activeBtn = document.getElementById('btn-' + name);
        if (activeBtn) activeBtn.classList.add('active');

        updateConstructor();
    }

    // КЛІК НА КНОПКУ АРКИ
    function changeArka(name) {
        currentArkaName = name;
        
        document.querySelectorAll('[id^="btn-arka"]').forEach(b => b.classList.remove('active'));
        const activeBtn = document.getElementById('btn-' + name);
        if (activeBtn) activeBtn.classList.add('active');

        updateConstructor();
    }

    // Автозапуск при завантаженні моделі та постійний контроль сцени
    if (viewer) {
        viewer.addEventListener('load', () => {
            updateConstructor();
        });
    }
</script>

</body>
</html>
