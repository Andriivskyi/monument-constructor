<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Конструктор пам'ятників</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        .controls { position: absolute; top: 10px; left: 10px; z-index: 10; }
        button { padding: 10px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Мій 3D конструктор</h1>
    
    <div class="controls">
        <button onclick="togglePart('arka_1')">Арка 1</button>
        <button onclick="togglePart('arka_2')">Арка 2</button>
    </div>

    <model-viewer id="model" src="test_2.glb" camera-controls style="width: 100%; height: 500px;"></model-viewer>

    <script>
        const modelViewer = document.getElementById('model');

        function togglePart(partName) {
            modelViewer.model.getObjectByName(partName).visible = !modelViewer.model.getObjectByName(partName).visible;
        }
    </script>
</body>
</html>
