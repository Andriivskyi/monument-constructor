<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>3D Конструктор Пам'ятників</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        body { background-color: #141414; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; text-align: center; }
        /* Додано плавний перехід для камери */
        model-viewer { width: 100%; height: 60vh; background: #222; border-radius: 10px; --poster-color: transparent; }
        .panel { background: #333; padding: 20px; border-radius: 10px; margin-top: 20px; }
        button { padding: 12px 20px; cursor: pointer; margin: 5px; border: 1px solid #555; border-radius: 5px; background: #444; color: white; transition: 0.3s; }
        button.active { background: #f39c12; border-color: #d35400; color: black; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Конструктор 3D Art Co</h1>
    <model-viewer 
        id="main-model" 
        src="https://raw.githubusercontent.com/Andriivskyi/monument-constructor/refs/heads/main/constructor.glb" 
        camera-controls 
        shadow-intensity="1"
        camera-orbit="-45deg 60deg auto">
    </model-viewer>

    <div class="panel">
        <div>Вибір основи:</div>
        <button id="btn-osnova" class="active" onclick="changeOsnova('osnova')">Основа 1</button>
        <button id="btn-osnova_1" onclick="changeOsnova('osnova_1')">Основа 2</button>
        <button id="btn-osnova_2" onclick="changeOsnova('osnova_2')">Основа 3</button>

        <div style="margin-top:20px;">Вибір арки:</div>
        <button id="btn-arka" class="active" onclick="changeArka('arka')">Пряма</button>
        <button id="btn-arka_1" onclick="changeArka('arka_1')">Хвилька</button>
        <button id="btn-arka_2" onclick="changeArka('arka_2')">Купол</button>
    </div>
</div>

<script>
    let currentOsnova = 'osnova';
    let currentArka = 'arka';
    const viewer = document.getElementById('main-model');

    // Універсальна математична функція "Абсолютного магніту"
    function snapToTarget(object, target) {
        if (!object || !target) return;
        const worldPos = target.position.clone();
        target.getWorldPosition(worldPos);
        if (object.parent) object.parent.worldToLocal(worldPos);
        object.position.copy(worldPos);
        object.updateMatrixWorld(true);
    }

    function update() {
        const scene = viewer[Object.getOwnPropertySymbols(viewer).find(e => e.description === 'scene')];
        if (!scene) return;

        let activeSocket = null;
        scene.traverse(node => {
            if (node.name.startsWith('osnova') && !node.name.includes('parent')) node.visible = false;
            if (node.name.startsWith('arka') && !node.name.includes('parent')) node.visible = false;
            if (node.name.startsWith('socket')) node.visible = false;
        });

        const activeOsnova = scene.getObjectByName(currentOsnova);
        const activeArka = scene.getObjectByName(currentArka);
        const centerSocket = scene.getObjectByName('socket_center');
        
        let socketName = 'socket_' + currentOsnova;
        if (currentOsnova === 'osnova') socketName = 'socket_osnova'; 
        activeSocket = scene.getObjectByName(socketName);

        if (activeOsnova && centerSocket) {
            activeOsnova.visible = true;
            snapToTarget(activeOsnova, centerSocket);
        }

        if (activeArka && activeSocket) {
            activeArka.visible = true;
            snapToTarget(activeArka, activeSocket);
        }

        const currentShadow = viewer.shadowIntensity || 1;
        viewer.shadowIntensity = currentShadow === 1 ? 0.99 : 1;
    }

    // Ініціалізація кольорів при завантаженні моделі
    viewer.addEventListener('load', () => {
        const scene = viewer[Object.getOwnPropertySymbols(viewer).find(e => e.description === 'scene')];
        
        scene.traverse(node => {
            if (node.isMesh) {
                // Клонуємо матеріал, щоб кожна деталь мала свій незалежний колір
                node.material = node.material.clone();
                
                // --- НАЛАШТУВАННЯ КОЛЬОРІВ ---
                // Основи (відтінки сірого)
                if (node.name === 'osnova') node.material.color.set('#555555'); 
                if (node.name === 'osnova_1') node.material.color.set('#777777'); 
                if (node.name === 'osnova_2') node.material.color.set('#333333'); 

                // Арки (відтінки темного графіту)
                if (node.name === 'arka') node.material.color.set('#1a1a1a'); 
                if (node.name === 'arka_1') node.material.color.set('#444444'); 
                if (node.name === 'arka_2') node.material.color.set('#8b8b8b'); 
            }
        });

        update(); // Запускаємо магніти після фарбування
    });

    function changeOsnova(n) {
        currentOsnova = n;
        document.querySelectorAll('button[id^="btn-osnova"]').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + n).classList.add('active');
        update();
    }

    function changeArka(n) {
        currentArka = n;
        document.querySelectorAll('button[id^="btn-arka"]').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + n).classList.add('active');
        update();
    }
</script>
</body>
</html>
