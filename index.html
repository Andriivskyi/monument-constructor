<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Конструктор пам'ятників</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        .controls { 
            position: absolute; top: 20px; left: 20px; z-index: 100; 
            background: rgba(255, 255, 255, 0.9); padding: 15px; border-radius: 8px;
            font-family: sans-serif;
        }
        button { 
            padding: 10px 15px; margin: 5px; cursor: pointer; 
            background-color: #333; color: white; border: none; border-radius: 4px;
        }
        model-viewer {
            width: 100%; height: 90vh; background-color: #e0e0e0;
        }
    </style>
</head>
<body>

    <div class="controls">
        <h3>Керування:</h3>
        <button onclick="togglePart(0)">Арка 1</button>
        <button onclick="togglePart(1)">Арка 2</button>
        <p><small>Відкрий F12, якщо не працює!</small></p>
    </div>

    <model-viewer id="model" src="test_2.glb" camera-controls shadow-intensity="1"></model-viewer>

    <script>
        const modelViewer = document.getElementById('model');

        function togglePart(index) {
            const model = modelViewer.model;
            if (!model) return;

            // Збираємо всі 3D-об'єкти (meshes) у список
            let meshes = [];
            modelViewer.model.scenes.forEach(scene => {
                scene.traverse(node => {
                    if (node.isMesh) meshes.push(node);
                });
            });

            console.log("Знайдено мешів у моделі:", meshes.length);

            // Перемикаємо видимість за індексом
            if (meshes[index]) {
                meshes[index].visible = !meshes[index].visible;
                console.log("Перемикаю об'єкт:", meshes[index].name || "без імені");
            } else {
                console.error("Об'єкт з індексом " + index + " не знайдено. Всього об'єктів: " + meshes.length);
            }
        }
    </script>
</body>
</html>
