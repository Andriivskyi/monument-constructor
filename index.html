<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>3D Конструктор</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
</head>
<body>

<model-viewer id="main-model" src="https://raw.githubusercontent.com/Andriivskyi/monument-constructor/refs/heads/main/constructor.glb" camera-controls></model-viewer>

<div class="panel">
    <button onclick="selectOsnova('osnova_00', 'socket_osnova')">Основа 1</button>
    <button onclick="selectOsnova('osnova_01', 'socket_osnova_1')">Основа 2</button>
    </div>

<script>
    const viewer = document.getElementById('main-model');

    function selectOsnova(osnovaName, socketName) {
        const scene = viewer[Object.getOwnPropertySymbols(viewer).find(e => e.description === 'scene')];
        
        const targetOsnova = scene.getObjectByName(osnovaName);
        const targetSocket = scene.getObjectByName(socketName);
        const centerSocket = scene.getObjectByName('socket_center');

        if (targetOsnova && centerSocket) {
            // 1. Ставимо основу в центр
            targetOsnova.position.copy(centerSocket.position);
            targetOsnova.visible = true;

            // 2. Арка (вказуємо, що вона має примагнітитись до сокета основи)
            // Припустимо, у тебе є arka_parent
            const arkaParent = scene.getObjectByName('arka_parent');
            if (arkaParent && targetSocket) {
                arkaParent.position.copy(targetSocket.position);
            }
        }
        viewer.requestUpdate();
    }
</script>
</body>
</html>
